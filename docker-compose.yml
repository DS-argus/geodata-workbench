services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geodata-db
    environment:
      POSTGRES_DB: geodata
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d geodata"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    container_name: geodata-api
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+psycopg://postgres:postgres@db:5432/geodata
      PROJECT_ROOT: /workspace
      VWORLD_API_KEY: ${VWORLD_API_KEY:-}
      APP_ENCRYPTION_KEY: ${APP_ENCRYPTION_KEY:-}
      WFS_CATALOG_PATH: /workspace/resources/wfs/브이월드_WFS_컬럼정보.xlsx
    ports:
      - "8000:8000"
    volumes:
      - ./:/workspace
      - ./rawdata:/workspace/rawdata
      - ./data:/workspace/data

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
    container_name: geodata-web
    depends_on:
      - api
    environment:
      VITE_API_PROXY_TARGET: http://api:8000
    ports:
      - "5173:5173"
    volumes:
      - ./apps/web:/workspace/apps/web
      - /workspace/apps/web/node_modules
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"

volumes:
  pgdata:
